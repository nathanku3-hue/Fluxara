name: Fluxara CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest

    - name: Compile python source files
      run: |
        python -m compileall fluxara_core

    - name: Run unit tests
      run: |
        python -m pytest -q

    - name: Run acceptance report checks
      run: |
        python generate_acceptance_report.py
        git diff --exit-code artifacts/r8_acceptance_report.json

    - name: Run manifest consistency checks
      run: |
        python scripts/check_release_manifest.py

    - name: Run demo module
      run: |
        python -m fluxara_core.demo

    - name: Run console script entrypoint
      run: |
        fluxara-demo --help
