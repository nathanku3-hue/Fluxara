name: Fluxara CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest

    - name: Compile python source files
      run: |
        python -m compileall fluxara_core

    - name: Run unit tests
      run: |
        python -m pytest

    - name: Run demo module
      run: |
        python -m fluxara_core.demo

    - name: Run console script entrypoint
      run: |
        fluxara-demo --help
